<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard - Earth Day Bingo</title>
    <link rel="icon" href="SVG%20Files/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-body page-body">
    <header class="app-header">
      <div class="brand-block">
        <div class="logo-row">
          <img src="cycat-logo-main.png" alt="CYCAT" class="logo-img" />
          <img src="glocal-logo-main.png" alt="Glocal" class="logo-img" />
        </div>
        <p class="eyebrow">Earth Day Bingo</p>
        <h1>Leaderboard</h1>
        <p class="lede">See how many lines participants have completed.</p>
      </div>
      <nav class="app-nav" aria-label="Primary">
        <a href="rules.html">Rules</a>
        <a href="app.html">Bingo Board</a>
        <a href="leaderboard.html" class="active">Leaderboard</a>
        <a href="settings.html">Settings</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-card leaderboard-card">
        <div class="leaderboard-header">
          <div>
            <h2>Rankings</h2>
            <p class="lede">Usernames ranked by lines completed.</p>
          </div>
          <div class="leaderboard-actions">
            <label class="leaderboard-autorefresh">
              <input type="checkbox" id="leaderboardAutoRefresh" checked />
              <span>Auto refresh</span>
            </label>
            <button id="refreshLeaderboard" class="ghost" type="button">Refresh</button>
          </div>
        </div>

        <div class="leaderboard-tools">
          <label>
            Search username
            <input id="leaderboardSearch" type="search" placeholder="Find a participant" />
          </label>
          <label>
            Sort by
            <select id="leaderboardSort">
              <option value="rank">Official rank</option>
              <option value="lines">Lines completed</option>
              <option value="tiles">Tiles completed</option>
              <option value="name">Username (A-Z)</option>
            </select>
          </label>
          <label class="leaderboard-mine-toggle">
            <input id="leaderboardMineOnly" type="checkbox" />
            <span>Show only me</span>
          </label>
        </div>

        <div class="admin-stats leaderboard-stats">
          <div class="stat-card">
            <p class="stat-label">Participants</p>
            <p id="leaderboardTotalPlayers" class="stat-value">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Your rank</p>
            <p id="leaderboardMyRank" class="stat-value">-</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Your score</p>
            <p id="leaderboardMyScore" class="stat-value">-</p>
          </div>
        </div>

        <div class="leaderboard-table-wrap">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Username</th>
                <th>Trend</th>
                <th>Lines</th>
                <th>Tiles</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
        <p id="leaderboardUpdatedAt" class="input-help leaderboard-updated"></p>
        <p id="leaderboardMessage" class="auth-message" aria-live="polite"></p>
      </section>
    </main>

    <script src="config.js?v=20260329"></script>
    <script src="content/avatars.js"></script>
    <script src="theme.js"></script>
    <script src="leaderboard.js"></script>
  </body>
</html>
