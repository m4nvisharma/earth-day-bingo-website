<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Earth Day Bingo</title>
    <link rel="icon" href="SVG%20Files/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-body page-body">
    <header class="app-header">
      <div class="brand-block">
        <div class="logo-row">
          <img src="cycat-logo-main.jpg" alt="CYCAT" class="logo-img" />
          <img src="glocal-logo-main.png" alt="Glocal" class="logo-img" />
        </div>
        <p class="eyebrow">Earth Day Bingo</p>
        <h1>Settings</h1>
        <p class="lede">Update your profile, avatar, and theme preferences.</p>
      </div>
      <nav class="app-nav" aria-label="Primary">
        <a href="rules.html">Rules</a>
        <a href="app.html">Bingo Board</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="settings.html" class="active">Settings</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-card settings-panel">
        <div class="settings-header">
          <div>
            <h2>Profile and appearance</h2>
            <p class="lede">Choose your theme, avatar, and username.</p>
          </div>
          <button id="saveSettings" class="primary">Save changes</button>
        </div>

        <p id="settingsMessage" class="auth-message" aria-live="polite"></p>

        <section class="settings-section">
          <h3>Theme</h3>
          <label class="settings-row">
            Color theme
            <select id="themeSelect" class="theme-select">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="love">Love</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h3>Avatar</h3>
          <div id="avatarPreview" class="avatar-preview"></div>
          <div id="avatarGrid" class="avatar-grid"></div>
          <button id="toggleAvatars" type="button" class="ghost small-inline">Show all avatars</button>
        </section>

        <section class="settings-section">
          <h3>Account</h3>
          <p id="accountMeta" class="input-help"></p>
          <label class="settings-row">
            Username
            <input
              id="usernameInput"
              type="text"
              minlength="4"
              placeholder="letters and numbers only"
              autocomplete="nickname"
            />
          </label>
          <div class="settings-actions">
            <button id="updateUsername" type="button" class="ghost">Update username</button>
            <button id="logoutBtn" type="button" class="ghost">Log out</button>
          </div>
        </section>
      </section>

      <section class="page-card danger-card">
        <h2>Delete account</h2>
        <p class="lede">This permanently removes your account and all uploaded data.</p>
        <div class="danger-action-row">
          <button id="deleteAccount" class="ghost danger">Delete account</button>
        </div>
      </section>
    </main>

    <script src="config.js?v=20260408"></script>
    <script src="content/avatars.js?v=20260408"></script>
    <script src="theme.js?v=20260408"></script>
    <script src="settings.js?v=20260408"></script>
  </body>
</html>
