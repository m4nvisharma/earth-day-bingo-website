<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Day Bingo - Login</title>
    <link rel="icon" href="SVG%20Files/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-body">
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="auth-header">
          <div class="logo-row">
            <img src="cycat-logo-main.jpg" alt="CYCAT" class="logo-img" />
            <img src="glocal-logo-main.png" alt="Glocal" class="logo-img" />
          </div>
          <p class="eyebrow">Earth Day Bingo</p>
          <h1>Welcome back to the wild</h1>
          <p class="lede">Log in to track your eco-actions and upload proof for each tile.</p>
        </div>

        <form id="loginForm" class="auth-form">
          <label>
            Email
            <input type="email" name="email" required placeholder="you@example.com" />
          </label>
          <label>
            Password
            <input type="password" name="password" required minlength="8" />
          </label>
          <button type="submit" class="primary">Log in</button>
          <button type="button" id="forgotPasswordToggle" class="ghost">Forgot password?</button>
        </form>

        <form id="forgotPasswordForm" class="auth-form" hidden>
          <label>
            Email for reset link
            <input type="email" name="email" required placeholder="you@example.com" />
          </label>
          <button type="submit" class="primary">Send reset link</button>
          <button type="button" id="forgotPasswordCancel" class="ghost">Back to login</button>
        </form>

        <div class="divider"><span>New here?</span></div>

        <form id="signupForm" class="auth-form">
          <label>
            Username
            <input type="text" name="username" required minlength="4" placeholder="ecohero" />
            <span class="input-help">At least 4 characters, letters and numbers only.</span>
          </label>
          <label>
            Full name (optional)
            <input type="text" name="displayName" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" name="email" required placeholder="you@example.com" />
          </label>
          <label>
            Password
            <input type="password" name="password" required minlength="8" />
          </label>
          <button type="submit" class="ghost">Create account</button>
        </form>

        <p id="authMessage" class="auth-message" aria-live="polite"></p>
      </section>

      <section class="auth-art">
        <div class="sun-glow"></div>
        <div class="card-preview">
          <div class="card-row">
            <span>Plant-based day</span>
            <span>Reuse containers</span>
          </div>
          <div class="card-row">
            <span>Pick up litter</span>
            <span>Bike 15 minutes</span>
          </div>
        </div>
        <p class="auth-quote">"Small acts. Shared planet. Big change."</p>
      </section>
    </main>

    <script src="config.js?v=20260329"></script>
    <script src="auth.js"></script>
  </body>
</html>
